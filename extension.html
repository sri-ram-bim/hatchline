<style>
  .hero{ padding:56px 0 40px; }
  .hero-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:56px; align-items:center; }
  .hero h1{ font-size:clamp(32px, 4.4vw, 50px); line-height:1.06; letter-spacing:-.01em; max-width:13ch; }
  .hero h1 em{ font-style:normal; color:var(--orange); text-decoration:underline; text-decoration-color:rgba(237,137,54,.35); text-decoration-thickness:4px; text-underline-offset:6px; }
  .hero p.lede{ margin-top:20px; font-size:17px; color:#454B51; max-width:48ch; }
  .hero-ctas{ display:flex; align-items:center; gap:16px; margin-top:28px; flex-wrap:wrap; }
  .back-link{ font-family:var(--mono); font-size:12.5px; color:var(--blueprint); text-decoration:none; display:inline-flex; align-items:center; gap:6px; margin-bottom:18px; }
  .back-link:hover{ text-decoration:underline; }
  .titleblock{ display:flex; align-items:center; gap:14px; font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--blueprint); margin-bottom:22px; }
  .titleblock .tagx{ border:1px solid var(--blueprint); padding:4px 9px; border-radius:2px; color:var(--blueprint); background:rgba(46,92,134,.06); }

  .queue-panel{ background:var(--paper); border:1px solid var(--hair); border-radius:5px; box-shadow:0 20px 44px -22px rgba(22,40,63,.35); overflow:hidden; }
  .queue-head{ background:var(--ink); color:#fff; padding:13px 18px; display:flex; align-items:center; justify-content:space-between; font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; }
  .queue-head .pill{ background:rgba(255,255,255,.12); border-radius:2px; padding:3px 8px; font-size:10.5px; }
  .queue-formats{ display:flex; gap:8px; padding:14px 18px 4px; flex-wrap:wrap; border-bottom:1px solid var(--hair); }
  .fmt-chip{ font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.03em; padding:5px 9px; border:1px solid var(--hair); border-radius:3px; color:var(--hair-dk); transition:color .25s ease, border-color .25s ease, background .25s ease; margin-bottom:10px; }
  .fmt-chip.lit{ color:var(--orange-dk); border-color:var(--orange); background:rgba(237,137,54,.08); }
  .queue-rows{ padding:6px 18px 16px; }
  .queue-row{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px dashed var(--hair); font-family:var(--mono); font-size:12.5px; color:var(--graphite); }
  .queue-row:last-child{ border-bottom:none; }
  .qbox{ width:15px; height:15px; border:1.5px solid var(--hair-dk); border-radius:2px; flex:none; position:relative; }
  .qbox.done{ border-color:var(--ok); background:var(--ok); }
  .qbox.done::after{ content:''; position:absolute; left:3px; top:0px; width:4px; height:8px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(40deg); }
  .qname{ flex:1; }
  .qstatus{ font-size:11px; color:var(--hair-dk); }
  .qstatus.done{ color:var(--ok); }
  .queue-progress{ padding:0 18px 18px; }
  .bar-track{ height:6px; background:var(--vellum); border-radius:99px; overflow:hidden; }
  .bar-fill{ height:100%; width:0%; background:var(--orange); border-radius:99px; animation:fillbar 5.5s ease-in-out infinite; }
  .bar-caption{ display:flex; justify-content:space-between; margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--hair-dk); }
  @keyframes fillbar{ 0%{ width:0%; } 70%{ width:100%; } 100%{ width:100%; } }
  @media (prefers-reduced-motion:reduce){ .bar-fill{ animation:none; width:70%; } }

  @media (max-width:980px){ .hero-grid{ grid-template-columns:1fr; } }
</style>
